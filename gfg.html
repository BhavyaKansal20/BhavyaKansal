font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cspan class=\"highlight\"\u003eProactive Monitoring:\u003c/span\u003eMonitor production systems, track data quality metrics, and flag anomalies before they become customer-facing issues. Youre the early warning system.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cspan class=\"highlight\"\u003eDocumentation \u0026amp; Automation:\u003c/span\u003eMaintain runbooks, FAQs, and troubleshooting guides. Identify repetitive issues and build lightweight automations (scripts, bots, alerts) to reduce manual toil over time.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cspan class=\"highlight\"\u003ePattern Recognition:\u003c/span\u003eTrack recurring issues, analyze trends, and surface insights to the engineering and product teams that help improve product reliability.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/div\u003e\u003cdiv class=\"section\"\u003e\u003ch2\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eTools \u0026amp; Systems Youll Work With\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/h2\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cspan class=\"highlight\"\u003eDatabases:\u003c/span\u003ePostgreSQL, Elasticsearch (for querying and investigating data issues)\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cspan class=\"highlight\"\u003eAPIs:\u003c/span\u003eREST APIs, Postman (for reproducing and debugging integration issues)\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cspan class=\"highlight\"\u003eMonitoring:\u003c/span\u003eAWS / Azure dashboards, log monitoring tools\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cspan class=\"highlight\"\u003eTicketing:\u003c/span\u003eJira, Slack (primary communication with customer team and engineering)\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cspan class=\"highlight\"\u003eScripting:\u003c/span\u003ePython / SQL (for investigation, reporting, and lightweight automation)\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/div\u003e\u003cdiv class=\"section\"\u003e\u003ch2\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u00  geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eStrong communication skills and the ability to document technical processes effectively.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eSoftware development experience is a plus.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/div\u003e\u003cdiv class=\"section\"\u003e\u003ch2\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eNice to Have\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/h2\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eExperience deploying and scaling \u003cspan class=\"highlight\"\u003eAI/ML workloads in production environments\u003c/span\u003e.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eFamiliarity with \u003cspan class=\"highlight\"\u003esingle-tenant deployment models\u003c/span\u003e.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eExperience with \u003cspan class=\"highlight\"\u003eMLOps/AIOps platforms\u003c/span\u003esuch as SageMaker or Kubeflow.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eKnowledge of \u003cspan class=\"highlight\"\u003echaos engineering and disaster recovery strategies\u003c/span\u003e.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eExperience with\u003cspan class=\"highlight\"\u003ecloud cost optimization\u003c/span\u003estrategies.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eRelevant \u003cspan class=\"highlight\"\u003ecloud certifications (AWS, Azure, or GCP)\u003c/span\u003e.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/div\u003e"])</script><script>self.__next_f.push([1,"1c:T590,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cspan data-mce-style=\"color: #000000; font-family: verdana, geneva, sans-serif; font-size: 12pt; white-space-collapse: preserve; background-color: #ffffff;\" style=\"color: rgb(0, 0, 0); font-family: verdana, geneva, sans-serif; font-size: 12pt; white-space-collapse: preserve; background-color: rgb(255, 255, 255);\"\u003ePinnacleU was created with the vision to empower business owners and founders to meet their ambitious goals by scaling their teams and building out their organization. We have partnered with high growth startups across the globe in building out their leadership and functional teams through our end to end recruitment solutions. Our expertise ranges across industries such as Edtech, D2C, Logistics and B2B Saas. We have closed tech roles such as Backend engineer, Tech Architect, Mobile developer and Devops as well as a variety of Marketing, Sales, Finance and HR leaders for our clients. If your organization is in need of top leadership or functional heads PinnacleU would love to partner with you in your hunt for the backbone of your business - The People \u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan data-mce-style=\"color: #000000; font-family: verdana, geneva, sans-serif; font-size: 12pt; white-space-collapse: preserve; background-color: #ffffff;\" style=\"color: rgb(0, 0, 0); font-family: verdana, geneva, sans-serif; font-size: 12pt; white-space-collapse: preserve; background-color: rgb(255, 255, 255);\"\u003e\u003cbr\u003e\u003c/span\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"1d:T47f2,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eRole Summary\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eWere looking for a Backend-focused Software Development Engineer II (SDE2) who can design, build, and scale the core platform services that power our oncology AI agents.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eThis is not a just ship tickets role. Youll own critical backend systems end-to-end from our high-throughput EHR data ingestion pipelines and AI orchestration layer to the APIs that serve clinicians in real time. Youll work closely with the AI, product, and infrastructure teams to ensure our platform remains fast, reliable, and secure as we scale across some of the worlds top cancer centers.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eYoull spend the majority of your time in the backend, building the data processing, workflow orchestration, and service infrastructure that forms the backbone of our platform. Strong Java/Spring Boot skills and a deep understanding of distributed systems are essential.\u003c/span\u003e\u003c/p\u003e\u003ch2\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eWhat You'll Work On\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/h2\u003e\u003cp\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eHere are examples of the kind of problems youll tackle:\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cstrong\u003eEHR Data Ingestion \u0026amp; Indexing:\u003c/strong\u003eBuild and optimize the OncoIndexer pipeline that ingests HL7, FHIR, CCDAs, PDFs, and scanned documents, transforming raw EHR data into a standardized, LLM-ready format at scale.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cstrong\u003eAI Agent Orchestration:\u003c/strong\u003eDesign and extend the orchestration layer that coordinates our constellation of oncology-tuned LLMs (3B72B parameters), managing multi-step agentic workflows for patient-level reasoning, trial matching, and data curation.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cstrong\u003eScalable Platform Services:\u003c/strong\u003eArchitect and maintain the microservices, APIs, and event-driven systems that process thousands of complex medical records daily, ensuring reliability, accuracy, and low-latency performance.\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cstrong\u003eHealthcare Integrations:\u003c/strong\u003eBuild and maintain secure integrations with hospital EMR systems, handling complex healthcare data standards, authentication, and compliance requirements.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003ch2\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003e\u003cem\u003e\u003cspan style=\"text-decoration: underline;\" data-mce-style=\"text-decoration: underline;\"\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/span\u003e\u003c/em\u003e\u003c/span\u003e\u003c/h2\u003e\u003cul\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eDesign, build, and maintain scalable backend services, APIs, and data pipelines\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eOwn the architecture of high-throughput document processing and indexing systems\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eWrite clean, testable, production-grade code with clear documentation\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eParticipate in architecture discussions and drive technical design decisions for backend systems\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: #000000;\"\u003eIndependently debug and resolve complex issues across distributed services\u003c/span\u003e\u003c/li\u003e\u003cli\u003e\u003cspan style=\"font-size: 12pt; font-family: verdana, geneva, sans-serif; color: rgb(0, 0, 0);\" data-mce-style=\"font-size: 12pt; font-family: verdana, gene 003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThink of a highway:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e5 wide lanes\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eSuddenly reduced to 1 lane\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eTraffic slows down not because of the entire highway.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 Because of the narrow section.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eSoftware systems behave the same way.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e🔑 Common Bottlenecks in Systems\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e1️⃣ Database\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eExamples:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMissing indexes\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eSlow queries\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eExcessive joins\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eSymptoms:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eHigh query latency\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIncreased response times\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e2️⃣ Network\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eExamples:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eLarge payloads\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eSlow external APIs\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eHigh latency connections\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e3️⃣ Application Layer\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eExamples:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eInefficient algorithms\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eExcessive processing\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMemory issues\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e4️⃣ Infrastructure\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eExamples:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eCPU saturation\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMemory exhaustion\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eDisk I/O limitations\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e⚡ The Optimization Trap\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMany engineers immediately start optimizing code.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eBut what if:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 The database is the real problem?\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eOr:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 A third-party API is causing delays?\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eOptimizing the wrong component creates:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e❌ More complexity\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e❌ Little performance gain\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e🚀 A Better Approach\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eStep 1: Measure\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eUse:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMetrics\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eLogs\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eTraces\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eProfilers\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eStep 2: Identify the Constraint\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eFind:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 What is slowing everything else down?\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eStep 3: Optimize the Bottleneck\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eFocus effort where impact is highest.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eStep 4: Repeat\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAfter removing one bottleneck:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 Another usually becomes visible.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e🧩 Real-World Example\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAPI response time:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 2 seconds\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eInvestigation shows:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eApplication processing = 50ms\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eDatabase query = 1800ms\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eNetwork = 150ms\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eOptimizing Java code won't help much.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThe bottleneck is:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 The database query.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e⚠️ Common Mistakes\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e❌ Optimizing without measuring\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e❌ Premature optimization\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e❌ Ignoring system metrics\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e❌ Focusing on assumptions instead of evidence\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e📌 Key Insight\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003ePerformance optimization is not about:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 Making everything faster.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIt's about:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 Finding and improving the component that limits the entire system.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e🎯 My Learning\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eOne lesson reinforced through backend engineering, performance tuning, and concepts learned on\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eGeeksforGeeks is that the biggest performance improvements often come from identifying the right bottleneck, not from making random optimizations.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e🚀 Final Thought\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eBefore optimizing anything, ask:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e👉 Is this actually the bottleneck?\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eBecause the fastest path to better performance is often through better understanding.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e🔥 Measure first. Identify second. Optimize third.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"GFGConnect\" href=\"/community/hashtag/22988/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#GFGConnect\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"PerformanceOptimization\" href=\"/community/hashtag/25400/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#PerformanceOptimization\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"SoftwareEngineering\" href=\"/community/hashtag/12498/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#SoftwareEngineering\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"BackendEngineering\" href=\"/community/hashtag/23667/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#BackendEngineering\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"SystemDesign\" href=\"/community/hashtag/12510/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#SystemDesign\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"Scalability\" href=\"/community/hashtag/13396/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#Scalability\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"DistributedSystems\" href=\"/community/hashtag/25293/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#DistributedSystems\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"EngineeringMindset\" href=\"/community/hashtag/23704/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#EngineeringMindset\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"GeeksforGeeks\" href=\"/community/hashtag/9625/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#GeeksforGeeks\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"TechSeries\" href=\"/community/hashtag/32776/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#TechSeries\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e \u003c/span\u003e\u003cgfg-hashtag\u003e\u003ca data-hashtag-text=\"165Posts\" href=\"/community/hashtag/39786/\"\u003e\u003cspan class=\"GFGEditorTheme__hashtag\"\u003e#165Posts\u003c/span\u003e\u003c/a\u003e\u003c/gfg-hashtag\u003e\u003cspan\u003e 🚦🚀\u003c/span\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"21:T207e,"])</script><script>self.__next_f.push([1,"\u003cp dir=\"ltr\"\u003e\u003cspan\u003eI am a final year student pursuing B.Tech in \u003c/span\u003e\u003ci\u003e\u003cem class=\"GFGEditorTheme__textItalic\"\u003eComputer Science and Business System\u003c/em\u003e\u003c/i\u003e\u003cspan\u003e from a Tier-3 state government college in Madhya Pradesh. Recently, I got an offer from Tata Consultancy Services (TCS). I am sharing my interview experience.\u003c/span\u003e\u003c/p\u003e\u003ch2 id=\"b\" style=\"text-align:left\"\u003e\u003cspan\u003eGetting Interview Opportuinity at TCS\u003c/span\u003e\u003c/h2\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eI appeared for TCS - NQT (National Qualifiers Test) exam in the last week of March 2026. It is a computer-based test held offline at TCS-ION centres across the country for entry-level recruitment at the company.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIt consists of numerical ability, general aptitude, verbal ability and 2 coding sections. For non-coding sections, you have to be fairly fast (I recommend at least 1 question per minute). I performed poorly in those sections because my speed is slow.\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eProgramming languages allowed in coding sections were - Python, C++, Java, Pearl, Delphi. You are given approximately 30 min for the easy coding section and 60 min for the advanced coding section. The editor is like a notepad with syntax highlighting. You don't get autocomplete. Most importantly (unlike Leetcode or GFG coding platform) you have to handle input and output for the test cases. I solved both the questions and passed all the test cases.\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAfter a week, I got an email that I am eligible for \u003c/span\u003e\u003ci\u003e\u003cem class=\"GFGEditorTheme__textItalic\"\u003eprime\u003c/em\u003e\u003c/i\u003e\u003cspan\u003e category interview and must confirm my availability for the same. I submitted the details accordingly. Post that, I received an invitation at a venue in my city in first week of April 2026.\u003c/span\u003e\u003c/p\u003e\u003ch2 id=\"i\" style=\"text-align:left\"\u003e\u003cspan\u003eComplementary Details\u003c/span\u003e\u003c/h2\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eI reached the interview venue at 10:00 am in the morning in business formals. Carried all the documents demanded in the invitation mail including resume and application form. First, all candidates were seated in a hall where a team of TCS employees checked our documents, marked attendance and allocated interview panels. Then the venue staff directed us to the location of our respective panels. Among all the candidates for a specific panel, interviews were conducted on a first come first serve basis.\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eFor prime category interviews, the panel consisted of three members - HR, Manager and Technical. The interviews lasted 10 min to 50 min. Mine lasted 20-25 min. I left the venue at around 5:00 pm.\u003c/span\u003e\u003c/p\u003e\u003ch2 id=\"t\" style=\"text-align:left\"\u003e\u003cspan\u003eOverview\u003c/span\u003e\u003c/h2\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eI handed over my resume and was asked to introduce myself. I gave my name, my tech stack, my coding style and goals. I tried to state that I am a python full stack developer and an engineer (not merely a coder). Then members asked questions one by one. There were no questions from the manager. The whole communication was in English. I tried to keep my answers simple and the tone formal and humble.\u003c/span\u003e\u003c/p\u003e\u003ch2 id=\"t-1\" style=\"text-align:left\"\u003e\u003cspan\u003eTechnical Round\u003c/span\u003e\u003c/h2\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eFollowing questions were asked.\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli value=\"1\"\u003e\u003cspan\u003eWhat does the following code do?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eA python code to find the max value from a 2d matrix.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"2\"\u003e\u003cspan\u003eWrite code on paper to find the character with max frequency in an input string.\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eI did it in approx. 5 min.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"3\"\u003e\u003cspan\u003eWhat technologies do you know?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: I am proficient in Python, Flask and SQL. I have some experience with React, HTML, CSS and JS. In future, I want to explore Rust.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"4\"\u003e\u003cspan\u003eWhy is Rust used?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: Because it provides safety with the performance comparable to C++ resulting in high operational efficieny, reduced costs and latency. (I also wanted to say memory safety but they moved to next question)\u003c/span\u003e\u003c/li\u003e\u003cli value=\"5\"\u003e\u003cspan\u003eDo you have any certifications?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: No.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"6\"\u003e\u003cspan\u003eDo you know about AWS EC2?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: I am not very familiar.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"7\"\u003e\u003cspan\u003eDo you know about AWS Lambda?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: Yes. It is a function as a service offering from AWS. We can deploy our code or containerized applications. Its pricing model is based on number of invocations and compute resources used.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"8\"\u003e\u003cspan\u003eHave you used git? Have you used any platform like github or gitlab?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: Yes. I have used github.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"9\"\u003e\u003cspan\u003eWhat is a hash URL in git?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: I am not familiar.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"10\"\u003e\u003cspan\u003eHow do you access a specific commit in a git project?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: I am not famililar.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"11\"\u003e\u003cspan\u003eHave you used SQL?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: Yes.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"12\"\u003e\u003cspan\u003eWhich SQL engine have you used?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: SQLite and MySQL.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"13\"\u003e\u003cspan\u003eOk, so state three SQL datatypes.\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: TEXT, INT and DATETIME.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"14\"\u003e\u003cspan\u003eIn any language you are comfortable, be it SQL or python, state how to convert the string \"2026-04-01 00:00:00\" to date time object.\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: In any of those languages, one formats a date time to string using \u003c/span\u003e\u003ci\u003e\u003cem class=\"GFGEditorTheme__textItalic\"\u003estrftime\u003c/em\u003e\u003c/i\u003e\u003cspan\u003e and parses using \u003c/span\u003e\u003ci\u003e\u003cem class=\"GFGEditorTheme__textItalic\"\u003estrptime\u003c/em\u003e\u003c/i\u003e\u003cspan\u003e. Since you are giving me a string to parse, we can use \u003c/span\u003e\u003ci\u003e\u003cem class=\"GFGEditorTheme__textItalic\"\u003estrptime\u003c/em\u003e\u003c/i\u003e\u003cspan\u003e. I am comfortable in python. We have a datetime.datetime module. We will use its \u003c/span\u003e\u003ci\u003e\u003cem class=\"GFGEditorTheme__textItalic\"\u003estrptime\u003c/em\u003e\u003c/i\u003e\u003ci\u003e\u003cb\u003e\u003cstrong class=\"GFGEditorTheme__textItalic\"\u003e \u003c/strong\u003e\u003c/b\u003e\u003c/i\u003e\u003cspan\u003efunction. We have codes like %y for year, %m for month, %d for day numbers and %H for hour, ..... and then wrote the parsing function on paper.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eI also explained two of my full stack projects. Although, no counter questions were asked.\u003c/span\u003e\u003c/p\u003e\u003ch2 id=\"h\" style=\"text-align:left\"\u003e\u003cspan\u003eHR Round\u003c/span\u003e\u003c/h2\u003e\u003cul\u003e\u003cli value=\"1\"\u003e\u003cspan\u003eWhat are the qualities of a leader?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswered.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"2\"\u003e\u003cspan\u003eWhat do you understand by integrity in workplace?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: I am not very familiar.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"3\"\u003e\u003cspan\u003eAre you comfortable with shift rotations?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: Yes.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"4\"\u003e\u003cspan\u003eWhat motivates you to do things?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: Seeing/anticipating the impact of my work.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"5\"\u003e\u003cspan\u003eHave you given any previous interviews? What were the results? Internships don't count.\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: Yes. IBM Associate Systems Engineer interview after clearing 2 communication and 2 coding rounds and TCS Prime interview itself few months ago where I was not selected.\u003c/span\u003e\u003c/li\u003e\u003cli value=\"6\"\u003e\u003cspan\u003e(Smiling) What is your analysis about not getting selected in them?\u003c/span\u003e\u003cbr/\u003e\u003cspan\u003eAnswer: I am slow in solving problems because I generally think exhaustively. I find this approach very useful in practice because it lets me to optimize my infrastructure/code well and overcome common pitfalls that fast solvers miss. While this approach contributes to long term stability and ensuring functional requirements of the projects, it doesn't allow me to answer properly in an interview format where I have to find answers in very limited time.\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eShe asked the manager and he said \"no questions from my side\". Then, she asked if I have any questions from them. I asked the following -\u003c/span\u003e\u003c/p\u003e\u003cul\u003e\u003cli value=\"1\"\u003e\u003cspan\u003eWhen can I expect joining if I am selected?\u003c/span\u003e\u003c/li\u003e\u003cli value=\"2\"\u003e\u003cspan\u003eIf I am selected, will I given training or am I expected to know all the things in advance?\u003c/span\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eHere, the interview ended and I wished good-day.\u003c/span\u003e\u003c/p\u003e\u003ch2 id=\"r\" style=\"text-align:left\"\u003e\u003cspan\u003eResult\u003c/span\u003e\u003c/h2\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAfter 1 week, I received an offer for Digital Role (For reference - Prime is approx. 9 LPA, Digital is approx. 7 LPA and Ninja is approx. 3.5 LPA for B.Tech students at the time of writing).\u003c/span\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"22:T20b3,"])</script><script>self.__next_f.push([1,"\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eDay-2 :  Binary Search Template Is Easier Than You Think\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMost students try to memorize Binary Search.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAnd that's exactly why they forget it.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThe real goal is not remembering the template.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eThe real goal is understanding what Low, High, and Mid are trying to do.\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eThe Beginner Struggle\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMany students can write Binary Search today.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eBut after a few weeks?\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThey forget:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e* When to move Low\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e* When to move High\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e* Why Mid is needed\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e* Why infinite loops happen\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThe problem is simple.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThey memorized the code.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThey never understood the idea.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eThe Core Idea\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eBinary Search is just a conversation between three pointers:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eLow\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eHigh\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eMid\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThat's it.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eLow says:\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003e\"My answer could be somewhere from here.\"\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eHigh says:\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003e\"My answer could be somewhere until here.\"\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eMid checks the middle and decides which half should survive.\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eEvery iteration removes half of the remaining search space.\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eVisual Thinking\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eImagine 100 students standing in a line.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eYou need to find one particular student.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eInstead of checking everyone,\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eyou ask the student standing in the middle.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eBased on the answer,\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e50 students become irrelevant instantly.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThen repeat.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAgain.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAnd again.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThe group keeps shrinking.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThat is exactly what Binary Search does.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eExample\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eInput:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003earr = [10, 20, 30, 40, 50, 60, 70]\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003etarget = 50\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eStep 1\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eLow = 0\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eHigh = 6\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMid = 3\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eValue at Mid = 40\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eTarget is larger.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIgnore the entire left half.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMove Low.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cspan\u003e↓\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eStep 2\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eLow = 4\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eHigh = 6\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMid = 5\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eValue at Mid = 60\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eTarget is smaller.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIgnore the right half.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMove High.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cspan\u003e↓\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eStep 3\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eLow = 4\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eHigh = 4\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMid = 4\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eValue at Mid = 50\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eAnswer found.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eMost Common Mistakes\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eMistake 1\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eMoving the wrong pointer.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIf target is bigger,\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003emove Low.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIf target is smaller,\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003emove High.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eMistake 2\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eNot updating boundaries properly.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThis can create infinite loops.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eMistake 3\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eTreating Binary Search like a formula.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIt is actually a search-space reduction process.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eInterview Lens\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eInterviewers are not checking whether you remember:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003emid = low + (high - low) / 2\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThey are checking whether you understand:\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003e\"Which half can be safely removed?\"\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eIf you can answer that,\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eyou can solve most Binary Search questions.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eMemory Rule\u003c/strong\u003e\u003c/b\u003e\u
